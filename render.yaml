services:
  - type: web
    name: smart-bangalore-traffic-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python -m ml.train_model
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FLASK_ENV
        value: production
